apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "retrodash-bridge.fullname" . }}-test-connection"
  labels:
    {{- include "retrodash-bridge.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['http://{{ include "retrodash-bridge.fullname" . }}:{{ .Values.service.port }}/healthz', '-O-', '-q']
  restartPolicy: Never
