apiVersion: v1
kind: Service
metadata:
  name: {{ include "retrodash-bridge.fullname" . }}
  labels:
    {{- include "retrodash-bridge.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.port | quote }}
    prometheus.io/path: "/metrics"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "retrodash-bridge.selectorLabels" . | nindent 4 }}
