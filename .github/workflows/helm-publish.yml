name: Publish Helm Chart

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'deploy/helm/**'
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-chart:
    name: Lint, Package & Push Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112  # v4
        with:
          version: v3.17.0

      - name: Update chart version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          TAG="${GIT_REF#refs/tags/v}"
          echo "Updating Chart.yaml: version=$TAG appVersion=$TAG"
          sed -i "s/^version: .*/version: $TAG/" deploy/helm/retrodash-bridge/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$TAG\"/" deploy/helm/retrodash-bridge/Chart.yaml
          cat deploy/helm/retrodash-bridge/Chart.yaml

      - name: Lint chart
        run: helm lint deploy/helm/retrodash-bridge

      - name: Package chart
        run: helm package deploy/helm/retrodash-bridge --destination /tmp/charts

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to OCI registry
        run: |
          helm push /tmp/charts/retrodash-bridge-*.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
